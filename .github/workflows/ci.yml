name: CMA Benchmark Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  # ---------------------------------------------------------------------------
  # JOB 1 — Ratio Benchmark
  # ---------------------------------------------------------------------------
  test-ratios:
    name: Ratio Benchmark (benchmark-suite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run ratio benchmark suite
        id: ratios
        run: |
          set +e
          OUTPUT=$(npm run test:ratios 2>&1)
          EXIT=$?
          printf '%s' "$OUTPUT"
          {
            echo 'output<<__EOF__'
            printf '%s\n' "$OUTPUT"
            echo '__EOF__'
            echo "exit=$EXIT"
          } >> "$GITHUB_OUTPUT"
          exit $EXIT

      - name: Write step summary
        if: always()
        env:
          STATUS: ${{ steps.ratios.outputs.exit == '0' && 'PASS' || 'FAIL' }}
          OUT: ${{ steps.ratios.outputs.output }}
        run: |
          ICON="$( [ "$STATUS" = 'PASS' ] && echo '✅' || echo '❌' )"
          echo "## Ratio Benchmark — $ICON $STATUS" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          printf '%s\n' "$OUT" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Post PR comment
        if: always() && github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ### 📊 Ratio Benchmark — ${{ steps.ratios.outputs.exit == '0' && '✅ PASS' || '❌ FAIL' }}
            <details><summary>Full output (click to expand)</summary>

            ```
            ${{ steps.ratios.outputs.output }}
            ```
            </details>
          comment-tag: ci-ratios

  # ---------------------------------------------------------------------------
  # JOB 2 — Bank Red Flag Scan
  # ---------------------------------------------------------------------------
  test-redflags:
    name: Bank Red Flag Scan (bank_red_flags)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run bank red flags scan
        id: redflags
        run: |
          set +e
          OUTPUT=$(npm run test:redflags 2>&1)
          EXIT=$?
          printf '%s' "$OUTPUT"
          {
            echo 'output<<__EOF__'
            printf '%s\n' "$OUTPUT"
            echo '__EOF__'
            echo "exit=$EXIT"
          } >> "$GITHUB_OUTPUT"
          exit $EXIT

      - name: Write step summary
        if: always()
        env:
          STATUS: ${{ steps.redflags.outputs.exit == '0' && 'PASS' || 'FAIL' }}
          OUT: ${{ steps.redflags.outputs.output }}
        run: |
          ICON="$( [ "$STATUS" = 'PASS' ] && echo '✅' || echo '❌' )"
          echo "## Bank Red Flag Scan — $ICON $STATUS" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          printf '%s\n' "$OUT" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Post PR comment
        if: always() && github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ### 🚩 Bank Red Flag Scan — ${{ steps.redflags.outputs.exit == '0' && '✅ PASS' || '❌ FAIL' }}
            <details><summary>Full output (click to expand)</summary>

            ```
            ${{ steps.redflags.outputs.output }}
            ```
            </details>
          comment-tag: ci-redflags

  # ---------------------------------------------------------------------------
  # JOB 3 — Engine Audit
  # ---------------------------------------------------------------------------
  test-audit:
    name: Engine Audit (engine_audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run engine audit
        id: audit
        run: |
          set +e
          OUTPUT=$(npm run test:audit 2>&1)
          EXIT=$?
          printf '%s' "$OUTPUT"
          {
            echo 'output<<__EOF__'
            printf '%s\n' "$OUTPUT"
            echo '__EOF__'
            echo "exit=$EXIT"
          } >> "$GITHUB_OUTPUT"
          exit $EXIT

      - name: Write step summary
        if: always()
        env:
          STATUS: ${{ steps.audit.outputs.exit == '0' && 'PASS' || 'FAIL' }}
          OUT: ${{ steps.audit.outputs.output }}
        run: |
          ICON="$( [ "$STATUS" = 'PASS' ] && echo '✅' || echo '❌' )"
          echo "## Engine Audit — $ICON $STATUS" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          printf '%s\n' "$OUT" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Post PR comment
        if: always() && github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ### 🔍 Engine Audit — ${{ steps.audit.outputs.exit == '0' && '✅ PASS' || '❌ FAIL' }}
            <details><summary>Full output (click to expand)</summary>

            ```
            ${{ steps.audit.outputs.output }}
            ```
            </details>
          comment-tag: ci-audit
